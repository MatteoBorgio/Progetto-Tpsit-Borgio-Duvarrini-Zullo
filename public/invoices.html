<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fatture - FreelanceFlow</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/layout.css">
</head>

<body>
<div class="container-fluid">
    <div class="row">
        <nav class="col-md-3 col-lg-2 bg-white sidebar p-3">
            <h4 class="text-primary mb-4">FreelanceFlow</h4>
            <ul class="nav flex-column">
                <li class="nav-item"><a class="nav-link" href="index.html">🏠 Dashboard</a></li>
                <li class="nav-item"><a class="nav-link" href="clients.html">👥 Clienti</a></li>
                <li class="nav-item"><a class="nav-link active" href="invoices.html">📄 Fatture</a></li>
            </ul>
        </nav>

        <main class="col-md-9 ms-sm-auto col-lg-10 px-md-4 py-4">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h2>Fatture Emesse</h2>
                <button class="btn btn-success" data-bs-toggle="modal" data-bs-target="#modalInvoice">📄 Nuova Fattura</button>
            </div>

            <div class="d-flex justify-content-between align-items-center mb-3">
                <div class="btn-group" id="filterGroup">
                    <button class="btn btn-outline-secondary btn-sm active" data-filter="all">Tutte</button>
                    <button class="btn btn-outline-secondary btn-sm" data-filter="Pagata">Pagate</button>
                    <button class="btn btn-outline-secondary btn-sm" data-filter="In attesa">In attesa</button>
                </div>

                <button id="btnExportCSV" class="btn btn-info btn-sm">
                    📥 Esporta Report (CSV)
                </button>
            </div>

            <div class="table-responsive bg-white p-3 shadow-sm rounded">
                <table class="table align-middle">
                    <thead>
                    <tr>
                        <th>Data</th>
                        <th>Cliente</th>
                        <th>Importo</th>
                        <th>Stato</th>
                        <th class="text-end">Azioni</th>
                    </tr>
                    </thead>
                    <tbody id="invoicesTableBody">
                    </tbody>
                </table>
            </div>
        </main>
    </div>
</div>

<div class="modal fade" id="modalInvoice" tabindex="-1">
    <div class="modal-dialog">
        <form id="formInvoice" class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Emetti Nuova Fattura</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <div class="mb-3">
                    <label class="form-label">Cliente</label>
                    <select class="form-select" id="selectClient" name="clientId" required>
                        <option value="">Seleziona un cliente...</option>
                    </select>
                </div>
                <div class="mb-3">
                    <label class="form-label">Data Emissione</label>
                    <input type="date" class="form-control" name="date" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Importo (€)</label>
                    <input type="number" step="0.01" class="form-control" name="amount" placeholder="0.00" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Descrizione</label>
                    <textarea class="form-control" name="description" rows="2" placeholder="Causale della fattura..."></textarea>
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Annulla</button>
                <button type="submit" class="btn btn-success">Genera Fattura</button>
            </div>
        </form>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="./js/invoices.js" type="module"></script>
</body>

</html>
