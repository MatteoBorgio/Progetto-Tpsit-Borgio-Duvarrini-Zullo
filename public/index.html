<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FreelanceFlow - Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/layout.css">
</head>
<body>
<div class="container-fluid">
    <div class="row">
        <nav class="col-md-3 col-lg-2 d-md-block bg-white sidebar collapse p-3">
            <h4 class="text-primary mb-4">FreelanceFlow</h4>
            <ul class="nav flex-column">
                <li class="nav-item"><a class="nav-link active" href="index.html">🏠 Dashboard</a></li>
                <li class="nav-item"><a class="nav-link" href="clients.html">👥 Clienti</a></li>
                <li class="nav-item"><a class="nav-link" href="invoices.html">📄 Fatture</a></li>
            </ul>
            <hr>
            <button id="btnBackup" class="btn btn-sm btn-outline-secondary w-100">💾 Scarica Backup</button>
        </nav>

        <main class="col-md-9 ms-sm-auto col-lg-10 px-md-4 py-4">
            <h2>Dashboard</h2>
            <p class="text-muted">Benvenuto nel tuo gestore di fatturazione.</p>

            <div class="row mt-4">
                <div class="col-md-4">
                    <div class="card shadow-sm border-0 bg-primary text-white p-3">
                        <h6>Totale Fatturato</h6>
                        <h3 id="statTotal">€ 0,00</h3>
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="card shadow-sm border-0 bg-success text-white p-3">
                        <h6>Fatture Pagate</h6>
                        <h3 id="statPaidCount">0</h3>
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="card shadow-sm border-0 bg-warning text-dark p-3">
                        <h6>In attesa</h6>
                        <h3 id="statPending">€ 0,00</h3>
                    </div>
                </div>
            </div>
        </main>
    </div>
</div>
<script src="js/index.js"></script>
</body>
</html>
