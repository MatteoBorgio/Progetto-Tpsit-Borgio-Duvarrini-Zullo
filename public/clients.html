<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="UTF-8">
    <title>Gestione Clienti - FreelanceFlow</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/layout.css">
</head>

<body>
    <div class="container-fluid">
        <div class="row">
            <nav class="col-md-3 col-lg-2 bg-white sidebar p-3">
                <h4 class="text-primary mb-4">FreelanceFlow</h4>
                <ul class="nav flex-column">
                    <li class="nav-item"><a class="nav-link" href="index.html">🏠 Dashboard</a></li>
                    <li class="nav-item"><a class="nav-link active" href="clients.html">👥 Clienti</a></li>
                    <li class="nav-item"><a class="nav-link" href="invoices.html">📄 Fatture</a></li>
                </ul>
            </nav>

            <main class="col-md-9 ms-sm-auto col-lg-10 px-md-4 py-4">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h2>I Tuoi Clienti</h2>
                    <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#modalClient">➕ Nuovo
                        Cliente</button>
                </div>

                <div class="table-responsive bg-white p-3 shadow-sm rounded">
                    <table class="table table-hover">
                        <thead>
                            <tr>
                                <th>Nome/Ragione Sociale</th>
                                <th>Partita IVA</th>
                                <th>Email</th>
                                <th>Azioni</th>
                            </tr>
                        </thead>
                        <tbody id="clientsTableBody">
                        </tbody>
                    </table>
                </div>
            </main>
        </div>
    </div>

    <div class="modal fade" id="modalClient" tabindex="-1">
        <div class="modal-dialog">
            <form id="formClient" class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Dati Cliente</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <div class="mb-3">
                        <label class="form-label">Nome</label>
                        <input type="text" class="form-control" name="name" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Partita IVA</label>
                        <input type="text" class="form-control" name="vatNumber" required maxlength="11">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Email</label>
                        <input type="email" class="form-control" name="email" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Indirizzo</label>
                        <input type="text" class="form-control" name="address" required
                            placeholder="Via Roma 1, Milano">
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Annulla</button>
                    <button type="submit" class="btn btn-primary">Salva Cliente</button>
                </div>
            </form>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="./js/clients.js"></script>
</body>

</html>
